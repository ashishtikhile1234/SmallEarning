# ============================================
# GigBuddy — LOCAL DEV Profile (H2 in-memory)
# ============================================
# Overrides application.properties for local dev
# Run with: -Dspring.profiles.active=dev  OR set SPRING_PROFILES_ACTIVE=dev

# --- H2 In-Memory Database ---
spring.datasource.url=jdbc:h2:mem:gigbuddydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console for debugging at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Disable dialect override from main properties
spring.jpa.properties.hibernate.dialect=

# --- Logging ---
logging.level.com.gigbuddy=DEBUG
logging.level.org.springframework.security=INFO
