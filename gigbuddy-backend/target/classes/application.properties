# ============================================
# GigBuddy Backend — Application Configuration
# ============================================

spring.application.name=gigbuddy-backend
server.port=8080

# --- PostgreSQL Database ---
spring.datasource.url=jdbc:postgresql://localhost:5432/gigbuddy_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- JWT ---
jwt.secret=${JWT_SECRET:gigbuddy-super-secret-key-minimum-256-bits-long-for-hs256-algorithm}
jwt.expiration=86400000

# --- SpringDoc / Swagger UI ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tags-sorter=alpha

# --- Logging ---
logging.level.com.gigbuddy=DEBUG
logging.level.org.springframework.security=INFO
